apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-registry
  namespace: kyc
  labels:
    app: service-registry
spec:
  replicas: 1          # Eureka runs as a singleton
  selector:
    matchLabels:
      app: service-registry
  template:
    metadata:
      labels:
        app: service-registry
    spec:
      containers:
        - name: service-registry
          image: REGION-docker.pkg.dev/PROJECT_ID/kyc-ms/service-registry:IMAGE_TAG
          ports:
            - containerPort: 8761
          env:
            - name: PORT
              value: "8761"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: service-registry
  namespace: kyc
spec:
  selector:
    app: service-registry
  ports:
    - port: 8761
      targetPort: 8761
  type: ClusterIP

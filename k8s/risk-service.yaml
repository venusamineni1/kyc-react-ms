apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-service
  namespace: kyc
  labels:
    app: risk-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-service
  template:
    metadata:
      labels:
        app: risk-service
    spec:
      containers:
        - name: risk-service
          image: REGION-docker.pkg.dev/PROJECT_ID/kyc-ms/risk-service:IMAGE_TAG
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: kyc-config
            - secretRef:
                name: kyc-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: risk-service
  namespace: kyc
spec:
  selector:
    app: risk-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP

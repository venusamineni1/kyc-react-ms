spring.application.name=viewer-core
server.port=${PORT:8083}

# Exclude Flowable Event Registry to avoid Kafka dependency issues
spring.autoconfigure.exclude=org.flowable.spring.boot.eventregistry.EventRegistryAutoConfiguration

# Flowable Settings
flowable.async-executor-activate=true
flowable.database-schema-update=true

# Inter-service URLs (override per environment)
risk.external-api.url=${RISK_SERVICE_URL:http://localhost:8081}/api/internal/risk/dummy-external-api
risk.service.url=${RISK_SERVICE_URL:http://localhost:8081}/api/internal/risk
screening.service.url=${SCREENING_SERVICE_URL:http://localhost:8082}/api/internal/screening
document.service.url=${DOCUMENT_SERVICE_URL:http://localhost:8085}/api/documents

# Internal service-to-service authentication key
internal.api.key=${INTERNAL_API_KEY:dev-internal-kyc-key-change-in-prod}

# PII Encryption (AES-256-GCM key: 32-byte random value, Base64-encoded)
# Generate: openssl rand -base64 32
app.encryptionKey=${ENCRYPTION_KEY:j5afag/9LpbAKCMfC9+eKRor5etIeRbD7J7KiHkc0sk=}

# JWT Configuration (must match auth-service)
app.jwtSecret=${JWT_SECRET:ThisIsA VeryLongAndComplexSecretKeyThatShouldBeEnoughForHS512AlgorithmMakeSureItIsAtLeast64BytesLongToSatisfyTheSecurityRequirement1234567890!_extra_padding_to_be_safe}
app.jwtExpirationInMs=${JWT_EXPIRY_MS:3600000}

# Database
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761}/eureka/
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:false}
eureka.instance.hostname=${HOSTNAME:localhost}

# JobRunr Scheduler
org.jobrunr.background-job-server.enabled=true
org.jobrunr.background-job-server.worker-count=${JOBRUNR_WORKERS:4}
org.jobrunr.dashboard.enabled=true
org.jobrunr.dashboard.port=${JOBRUNR_DASHBOARD_PORT:8000}
org.jobrunr.database.skip-create=false

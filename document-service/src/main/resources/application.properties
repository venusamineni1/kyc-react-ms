spring.application.name=document-service
server.port=${PORT:8085}

spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.sql.init.mode=always

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761}/eureka/
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:false}
eureka.instance.hostname=${HOSTNAME:localhost}

# ── OCR Configuration ────────────────────────────────────────────────────────
# true  → return synthetic mock data (no Tesseract call, works offline)
# false → run real Tesseract via JavaCPP embedded binaries (no OS install needed;
#         requires eng.traineddata in resources — run ./gradlew :document-service:downloadTessdata)
ocr.mock=false
# OCR language — must match a .traineddata file bundled in resources/tessdata/
ocr.language=${OCR_LANGUAGE:eng}

# ── Multipart upload limits (documents can be large) ─────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

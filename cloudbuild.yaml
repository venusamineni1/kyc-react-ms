# Google Cloud Build — CI/CD pipeline for KYC Microservices
#
# Substitutions (set in Cloud Build trigger or --substitutions flag):
#   _REGION   : Artifact Registry region  e.g. us-central1
#   _CLUSTER  : GKE cluster name          e.g. kyc-cluster
#   _ZONE     : GKE cluster zone          e.g. us-central1-a
#   _REPO     : Artifact Registry repo    e.g. kyc-ms
#
# Auto-provided by Cloud Build:
#   $PROJECT_ID, $COMMIT_SHA, $BRANCH_NAME

substitutions:
  _REGION:  us-central1
  _CLUSTER: kyc-cluster
  _ZONE:    us-central1-a
  _REPO:    kyc-ms

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

steps:
  # ── 1. Build all backend JARs once (shared Gradle cache layer) ──────────────
  - id: gradle-build
    name: eclipse-temurin:21-jdk-alpine
    entrypoint: sh
    args:
      - -c
      - chmod +x gradlew && ./gradlew build -x test --no-daemon --parallel
    waitFor: ['-']

  # ── 2. Build Docker images in parallel ─────────────────────────────────────
  - id: build-service-registry
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/service-registry:$COMMIT_SHA
      - -f
      - service-registry/Dockerfile
      - .
    waitFor: [gradle-build]

  - id: build-api-gateway
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api-gateway:$COMMIT_SHA
      - -f
      - api-gateway/Dockerfile
      - .
    waitFor: [gradle-build]

  - id: build-auth-service
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/auth-service:$COMMIT_SHA
      - -f
      - auth-service/Dockerfile
      - .
    waitFor: [gradle-build]

  - id: build-risk-service
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/risk-service:$COMMIT_SHA
      - -f
      - risk-service/Dockerfile
      - .
    waitFor: [gradle-build]

  - id: build-screening-service
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/screening-service:$COMMIT_SHA
      - -f
      - screening-service/Dockerfile
      - .
    waitFor: [gradle-build]

  - id: build-document-service
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/document-service:$COMMIT_SHA
      - -f
      - document-service/Dockerfile
      - .
    waitFor: [gradle-build]

  - id: build-viewer
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/viewer:$COMMIT_SHA
      - -f
      - viewer/Dockerfile
      - .
    waitFor: [gradle-build]

  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA
      - -f
      - viewer/frontend/Dockerfile
      - viewer/frontend
    waitFor: ['-']   # Frontend build is independent — runs immediately

  # ── 3. Push all images ───────────────────────────────────────────────────────
  - id: push-images
    name: gcr.io/cloud-builders/docker
    entrypoint: sh
    args:
      - -c
      - |
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/service-registry:$COMMIT_SHA &
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api-gateway:$COMMIT_SHA &
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/auth-service:$COMMIT_SHA &
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/risk-service:$COMMIT_SHA &
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/screening-service:$COMMIT_SHA &
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/document-service:$COMMIT_SHA &
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/viewer:$COMMIT_SHA &
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA &
        wait
    waitFor:
      - build-service-registry
      - build-api-gateway
      - build-auth-service
      - build-risk-service
      - build-screening-service
      - build-document-service
      - build-viewer
      - build-frontend

  # ── 4. Update image tags in K8s manifests and deploy to GKE ─────────────────
  - id: deploy
    name: gcr.io/cloud-builders/kubectl
    entrypoint: sh
    args:
      - -c
      - |
        # Inject the real image tags into manifests
        sed -i "s|IMAGE_TAG|$COMMIT_SHA|g; s|PROJECT_ID|$PROJECT_ID|g; s|REGION|${_REGION}|g" k8s/*.yaml

        # Apply in dependency order
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/service-registry.yaml
        kubectl apply -f k8s/auth-service.yaml
        kubectl apply -f k8s/risk-service.yaml
        kubectl apply -f k8s/screening-service.yaml
        kubectl apply -f k8s/document-service.yaml
        kubectl apply -f k8s/viewer.yaml
        kubectl apply -f k8s/api-gateway.yaml
        kubectl apply -f k8s/frontend.yaml
        kubectl apply -f k8s/ingress.yaml

        # Wait for rollout
        kubectl rollout status deployment/service-registry -n kyc --timeout=180s
        kubectl rollout status deployment/api-gateway       -n kyc --timeout=180s
    env:
      - CLOUDSDK_COMPUTE_ZONE=$_ZONE
      - CLOUDSDK_CONTAINER_CLUSTER=$_CLUSTER
    waitFor: [push-images]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/service-registry:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api-gateway:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/auth-service:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/risk-service:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/screening-service:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/document-service:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/viewer:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA

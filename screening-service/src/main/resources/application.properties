spring.application.name=screening-service

# Internal service-to-service authentication key (must match viewer)
internal.api.key=${INTERNAL_API_KEY:dev-internal-kyc-key-change-in-prod}
server.port=${PORT:8082}

spring.datasource.url=${DB_URL:jdbc:h2:mem:screeningdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=${H2_CONSOLE:true}

eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761}/eureka/
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:false}
eureka.instance.hostname=${HOSTNAME:localhost}

# Batch Screening Configuration
batch.work.dir=${BATCH_WORK_DIR:batch-work}
batch.sftp.upload.dir=upload
batch.sftp.download.dir=download
batch.publicKeyPath=${GPG_PUBLIC_KEY_PATH:batch-work/pubring.gpg}
batch.privateKeyPath=${GPG_PRIVATE_KEY_PATH:batch-work/secring.gpg}
batch.passphrase=${GPG_PASSPHRASE:password}

# SFTP Configuration
sftp.host=${SFTP_HOST:localhost}
sftp.port=${SFTP_PORT:22}
sftp.user=${SFTP_USER:user}
sftp.password=${SFTP_PASSWORD:password}
# Set to false in production when a real SFTP server is available
batch.sftp.mock=${SFTP_MOCK:true}
